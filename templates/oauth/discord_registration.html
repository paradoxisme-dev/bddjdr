{% extends 'base.html' %}

{% block title %}Registration{% endblock %}

{% block content %}

    {{ form.hidden_tag() }}
    <p>
        {{ form.username.label }}<br>
        {{ form.username(size=32) }}

    <p><input type="submit" value="Register"></p>
</form>
{% endblock %}
