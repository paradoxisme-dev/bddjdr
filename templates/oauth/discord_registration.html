{% extends 'base.html' %}

{% block title %}Registration{% endblock %}

{% block content %}
<form method="post">
    {{ form.hidden_tag() }}
    <p>
        {{ form.username.label }}<br>
        {{ form.username(size=32) }}
        {% for error in form.username.errors %}
            <span style="color: red;">{{ error }}</span>
        {% endfor %}
    </p>
    <p><input type="submit" value="Register"></p>
</form>
{% endblock %}
